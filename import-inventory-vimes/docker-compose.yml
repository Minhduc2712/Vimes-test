version: '3.8'
services:
    db:
        image: postgres:15
        container_name: vimes_postgres
        environment:
            POSTGRES_USER: root
            POSTGRES_PASSWORD: secretpassword
            POSTGRES_DB: inventory_db
        ports:
            - '5432:5432'
        volumes:
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
